<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🤖 Auto Robô v2.0</title>
  <style>
    :root {
      --bg: #0f1116;
      --card: #161b22;
      --text: #e6edf3;
      --primary: #58a6ff;
      --success: #3fb950;
      --warning: #d29922;
      --danger: #f85149;
      --border: #30363d;
      --input-bg: #252525;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body {
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      min-height: 100vh;
    }
    header {
      text-align: center;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: var(--primary);
    }
    .subtitle {
      opacity: 0.7;
      font-size: 0.9rem;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }
    .card h2 {
      margin-bottom: 16px;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mode-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    button {
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-dev { background: var(--primary); color: white; }
    .btn-prod { background: var(--success); color: white; }
    .btn-diag { background: var(--warning); color: black; }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      font-size: 0.9rem;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
    }
    .status-dot.idle { background: #555; }
    .status-dot.running { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .logs {
      background: #000;
      color: #ccc;
      height: 300px;
      overflow-y: auto;
      padding: 12px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
    }
    .log-line {
      margin-bottom: 4px;
      border-bottom: 1px solid #222;
      padding-bottom: 2px;
    }
    .log-info { color: var(--primary); }
    .log-success { color: var(--success); }
    .log-warn { color: var(--warning); }
    .log-error { color: var(--danger); }
    .timestamp {
      opacity: 0.6;
      margin-right: 8px;
    }
    /* Novos estilos para o menu de tarefas */
    .task-select {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    .task-select:focus {
      outline: 2px solid var(--primary);
      border-color: var(--primary);
    }
    .param-fields {
      display: none;
      margin-bottom: 15px;
      animation: slideDown 0.2s ease;
    }
    .param-fields.visible {
      display: block;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .param-input {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.95rem;
    }
    .param-input:focus {
      outline: 2px solid var(--primary);
      border-color: var(--primary);
    }
    .param-input::placeholder {
      opacity: 0.5;
    }
    .task-hint {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 4px;
      padding-left: 4px;
    }
    @media (max-width: 600px) {
      .mode-buttons { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🤖 Auto Robô v2.0</h1>
    <div class="subtitle">Desenvolvido por xAgron • ADS • Autismo Nível 1</div>
  </header>

  <div class="container">
    
    <!-- 🎯 Menu de Tarefas (NOVO) -->
    <div class="card">
      <h2>🎯 Selecione o Processo</h2>
      
      <select id="taskSelect" class="task-select">
        <option value="FULL">🤖 Automação Completa (GOI + WFM + Injeção D0)</option>
        <option value="GOI_CHECK">🔍 Verificar Ordem/Status de Injeção (GOI)</option>
        <option value="WFM_CPF">👤 Buscar e Abrir CPF de Cliente (WFM)</option>
        <option value="GPS_OPEN">🌐 Abrir Sistema GPS (Geoprocessamento)</option>
      </select>

      <!-- Campos dinâmicos que aparecem conforme a tarefa -->
      <div id="paramFields" class="param-fields">
        
        <!-- Campo CPF para WFM -->
        <div id="cpfField" style="display:none;">
          <input type="text" id="inputCPF" class="param-input" placeholder="CPF (ex: 123.456.789-00)" maxlength="14">
          <div class="task-hint">💡 Digite apenas números ou use máscara: 000.000.000-00</div>
        </div>

        <!-- Campo Ordem para GOI -->
        <div id="orderField" style="display:none;">
          <input type="text" id="inputOrder" class="param-input" placeholder="Número da Ordem ou ID">
          <div class="task-hint">💡 Ex: ORD-123456 ou apenas 123456</div>
        </div>

      </div>

      <div class="mode-buttons">
        <button id="btnDev" class="btn-dev" onclick="startRobot('DEV')">
          🧪 Modo Desenvolvimento<br><small>(Mock Local)</small>
        </button>
        <button id="btnProd" class="btn-prod" onclick="startRobot('PROD')">
          🏢 Modo Produção<br><small>(Rede Corporativa)</small>
        </button>
      </div>
      
      <div class="status-bar">
        <span class="status-dot idle" id="statusDot"></span>
        <span id="statusText">Aguardando comando...</span>
      </div>
    </div>

    <!-- Diagnóstico -->
    <div class="card">
      <h2>🔍 Diagnóstico Rápido</h2>
      <button class="btn-diag" onclick="runDiagnostics()">
        📡 Verificar Rede e Mock
      </button>
      <div id="diagnosticResult" style="margin-top: 12px; font-size: 0.9rem;"></div>
    </div>

    <!-- Logs -->
    <div class="card">
      <h2>📝 Logs em Tempo Real</h2>
      <div id="logs" class="logs"></div>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const logsEl = document.getElementById('logs');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const diagnosticResult = document.getElementById('diagnosticResult');

    // Elementos do menu de tarefas
    const taskSelect = document.getElementById('taskSelect');
    const paramFields = document.getElementById('paramFields');
    const cpfField = document.getElementById('cpfField');
    const orderField = document.getElementById('orderField');
    const inputCPF = document.getElementById('inputCPF');
    const inputOrder = document.getElementById('inputOrder');

    // Máscara de CPF em tempo real
    inputCPF.addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '');
      if (value.length > 3 && value.length <= 6) {
        value = value.replace(/(\d{3})(\d)/, '$1.$2');
      } else if (value.length > 6 && value.length <= 9) {
        value = value.replace(/(\d{3})(\d{3})(\d)/, '$1.$2.$3');
      } else if (value.length > 9) {
        value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
      }
      e.target.value = value;
    });

    // Mostra/esconde campos conforme a tarefa selecionada
    taskSelect.addEventListener('change', () => {
      const task = taskSelect.value;
      
      // Reset dos campos
      paramFields.classList.remove('visible');
      cpfField.style.display = 'none';
      orderField.style.display = 'none';
      inputCPF.value = '';
      inputOrder.value = '';

      // Lógica de exibição
      if (task === 'WFM_CPF') {
        paramFields.classList.add('visible');
        cpfField.style.display = 'block';
        inputCPF.focus();
      } else if (task === 'GOI_CHECK') {
        paramFields.classList.add('visible');
        orderField.style.display = 'block';
        inputOrder.focus();
      }
    });

    // Socket: recebe logs do servidor
    socket.on('log', (data) => {
      const time = new Date().toLocaleTimeString();
      const line = document.createElement('div');
      line.className = `log-line log-${data.level}`;
      line.innerHTML = `<span class="timestamp">[${time}]</span>${data.msg}`;
      logsEl.appendChild(line);
      logsEl.scrollTop = logsEl.scrollHeight;
    });

    // Socket: atualiza status do robô
    socket.on('status', (data) => {
      if (data.running) {
        statusDot.className = 'status-dot running';
        statusText.textContent = 'Executando automação...';
      } else {
        statusDot.className = 'status-dot idle';
        statusText.textContent = 'Pronto para novo comando';
      }
      document.getElementById('btnDev').disabled = data.running;
      document.getElementById('btnProd').disabled = data.running;
    });

    // Função principal: inicia o robô com tarefa + parâmetros
    function startRobot(mode) {
      const task = taskSelect.value;
      const params = {};

      // Coleta parâmetros conforme a tarefa
      if (task === 'WFM_CPF') {
        const cpfRaw = inputCPF.value.trim();
        const cpf = cpfRaw.replace(/\D/g, ''); // Remove máscara para envio
        if (!cpf || cpf.length !== 11) {
          addLocalLog('⚠ CPF inválido! Digite 11 dígitos.', 'warn');
          inputCPF.focus();
          return;
        }
        params.cpf = cpf;
      }
      
      if (task === 'GOI_CHECK') {
        const order = inputOrder.value.trim();
        if (!order) {
          addLocalLog('⚠ Preencha o Número da Ordem!', 'warn');
          inputOrder.focus();
          return;
        }
        params.order = order;
      }

      // Envia para o servidor
      socket.emit('start-robot', { mode, task, params });
      addLocalLog(`🚀 Tarefa: ${task} | Modo: ${mode}`, 'info');
      
      // Feedback visual imediato
      if (task === 'WFM_CPF') {
        addLocalLog(`📋 Buscando CPF: ${params.cpf}`, 'info');
      } else if (task === 'GOI_CHECK') {
        addLocalLog(`📋 Verificando ordem: ${params.order}`, 'info');
      }
    }

    // Diagnóstico de rede
    function runDiagnostics() {
      addLocalLog('🔍 Iniciando diagnóstico de rede...', 'info');
      diagnosticResult.innerHTML = '<em>Analisando...</em>';
      
      fetch('/api/diagnose')
        .then(res => res.json())
        .then(data => {
          let html = '';
          if (data.mock) {
            html += `<div class="log-success">✅ Mock Server: ONLINE (Porta 3456)</div>`;
          } else {
            html += `<div class="log-error">❌ Mock Server: OFFLINE</div>`;
          }
          if (data.vpn) {
            html += `<div class="log-success">✅ Rede Corporativa: ACESSÍVEL</div>`;
          } else {
            html += `<div class="log-warn">⚠️ Rede Corporativa: INACESSÍVEL (sem VPN/cabo)</div>`;
          }
          diagnosticResult.innerHTML = html;
        })
        .catch(() => {
          diagnosticResult.innerHTML = '<div class="log-error">❌ Erro ao executar diagnóstico</div>';
        });
    }

    // Log local (feedback imediato antes do socket)
    function addLocalLog(msg, level) {
      const time = new Date().toLocaleTimeString();
      const line = document.createElement('div');
      line.className = `log-line log-${level}`;
      line.innerHTML = `<span class="timestamp">[${time}]</span>${msg}`;
      logsEl.appendChild(line);
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    // Atalhos de teclado
    document.addEventListener('keydown', (e) => {
      if (e.key === '1') startRobot('DEV');
      if (e.key === '2') startRobot('PROD');
      if (e.key === 'd' || e.key === 'D') runDiagnostics();
    });

    // Foco inicial no campo correto ao carregar
    window.addEventListener('load', () => {
      taskSelect.dispatchEvent(new Event('change'));
    });
  </script>
</body>
</html>
